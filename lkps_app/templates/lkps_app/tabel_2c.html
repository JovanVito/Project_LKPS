{% extends 'lkps_app/base.html' %}
{% block content %}
<div class="card card-modern border-top-orange shadow-sm mb-4">
    <div class="card-header bg-white py-3">
        <h5 class="fw-bold text-dark m-0">Tabel 2.C: Fleksibilitas Dalam Proses Pembelajaran</h5>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-bordered table-hover align-middle mb-0">
                <thead class="table-light text-center small">
                    <tr><th rowspan="2" class="align-middle">Bentuk Pembelajaran</th><th colspan="3">Jml Mahasiswa per Tahun</th><th rowspan="2" class="align-middle">Link Bukti</th></tr>
                    <tr><th>TS-2</th><th>TS-1</th><th>TS</th></tr>
                </thead>
                <tbody id="tbody-2c">
                    <tr>
                        <td><input type="text" class="form-control form-control-sm border-0 bg-transparent auto-save-input" value="Micro-credential"></td>
                        <td><input type="number" class="form-control form-control-sm border-0 bg-transparent auto-save-input text-center" placeholder="0"></td>
                        <td><input type="number" class="form-control form-control-sm border-0 bg-transparent auto-save-input text-center" placeholder="0"></td>
                        <td><input type="number" class="form-control form-control-sm border-0 bg-transparent auto-save-input text-center" placeholder="0"></td>
                        <td><input type="text" class="form-control form-control-sm border-0 bg-transparent auto-save-input" placeholder="URL Bukti"></td>
                    </tr>
                </tbody>
            </table>
            <button class="btn btn-sm btn-outline-secondary m-3" onclick="tambahBaris('tbody-2c')"><i class="fas fa-plus"></i> Tambah Bentuk Pembelajaran Lainnya</button>
        </div>
    </div>
</div>
{% endblock %}

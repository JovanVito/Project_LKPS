{% extends 'lkps_app/base.html' %}
{% block content %}
<div class="card card-modern border-top-purple shadow-sm">
    <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
        <h5 class="fw-bold text-dark m-0">Tabel 2.B.1: Isi Kurikulum dan Capaian Pembelajaran</h5>
        <button class="btn btn-sm btn-primary" onclick="tambahBaris('tbody-2b1')"><i class="fas fa-plus me-1"></i> Tambah Mata Kuliah</button>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-bordered table-hover align-middle mb-0">
                <thead class="table-light text-center small">
                    <tr>
                        <th rowspan="2">Kode MK</th><th rowspan="2">Nama Mata Kuliah</th><th rowspan="2">SKS</th><th rowspan="2">Smt</th><th colspan="4">CPL yang Dipenuhi</th>
                    </tr>
                    <tr><th>Sikap</th><th>Pengetahuan</th><th>KU</th><th>KK</th></tr>
                </thead>
                <tbody id="tbody-2b1">
                    <tr>
                        <td><input type="text" class="form-control form-control-sm border-0 auto-save-input text-center" placeholder="Kode"></td>
                        <td><input type="text" class="form-control form-control-sm border-0 auto-save-input" placeholder="Nama MK"></td>
                        <td><input type="number" class="form-control form-control-sm border-0 auto-save-input text-center"></td>
                        <td><input type="number" class="form-control form-control-sm border-0 auto-save-input text-center"></td>
                        <td><input type="text" class="form-control form-control-sm border-0 auto-save-input text-center" placeholder="v"></td>
                        <td><input type="text" class="form-control form-control-sm border-0 auto-save-input text-center" placeholder="v"></td>
                        <td><input type="text" class="form-control form-control-sm border-0 auto-save-input text-center" placeholder="v"></td>
                        <td><input type="text" class="form-control form-control-sm border-0 auto-save-input text-center" placeholder="v"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'lkps_app/base.html' %}
{% block content %}
<div class="card card-modern border-top-blue shadow-sm mb-4">
    <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
        <h5 class="fw-bold text-dark m-0">Tabel 2.B.5: Bidang Kerja Lulusan</h5>
        <button class="btn btn-sm text-white" style="background-color: var(--pradita-navy);" onclick="tambahBaris('tbody-2b5')">
            <i class="fas fa-plus me-1"></i> Tambah Tahun
        </button>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-bordered table-hover align-middle mb-0">
                <thead class="table-light text-center small">
                    <tr>
                        <th rowspan="2" class="align-middle">Tahun Lulus</th><th rowspan="2" class="align-middle">Jumlah Lulusan Terlacak</th>
                        <th colspan="2">Kesesuaian Bidang</th><th colspan="3">Tingkat/Ukuran Tempat Kerja</th>
                    </tr>
                    <tr>
                        <th>Infokom</th><th>Non-Infokom</th><th>Internasional</th><th>Nasional</th><th>Wirausaha</th>
                    </tr>
                </thead>
                <tbody id="tbody-2b5">
                    <tr>
                        <td><input type="text" class="form-control form-control-sm border-0 bg-transparent auto-save-input text-center" placeholder="TS-x"></td>
                        <td><input type="number" class="form-control form-control-sm border-0 bg-transparent auto-save-input text-center" placeholder="0"></td>
                        <td><input type="number" class="form-control form-control-sm border-0 bg-transparent auto-save-input text-center" placeholder="0"></td>
                        <td><input type="number" class="form-control form-control-sm border-0 bg-transparent auto-save-input text-center" placeholder="0"></td>
                        <td><input type="number" class="form-control form-control-sm border-0 bg-transparent auto-save-input text-center" placeholder="0"></td>
                        <td><input type="number" class="form-control form-control-sm border-0 bg-transparent auto-save-input text-center" placeholder="0"></td>
                        <td><input type="number" class="form-control form-control-sm border-0 bg-transparent auto-save-input text-center" placeholder="0"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

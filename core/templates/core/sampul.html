{% extends 'core/base.html' %}
{% load static %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-10">
        
        <div class="alert bg-white border-0 shadow-sm rounded-4 mb-4 d-flex align-items-center" style="border-left: 5px solid var(--pradita-blue) !important;">
            <div class="icon-box icon-box-blue mb-0 border-0">
                <i class="fas fa-database"></i>
            </div>
            <div>
                <h6 class="fw-bold mb-1" style="color: var(--pradita-navy);">Autosave Sinkronisasi Database</h6>
                <p class="text-muted mb-0 small">Setiap perubahan data profil institusi akan disimpan secara real-time ke PostgreSQL.</p>
            </div>
        </div>

        <div class="card card-modern border-top-orange shadow-sm">
            <div class="card-header card-header-modern d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center">
                    <div class="icon-box icon-box-orange"><i class="fas fa-id-card"></i></div>
                    <div>
                        <h3 class="card-title">Identitas Pengusul</h3>
                        <small class="text-muted">Profil Institusi dan Program Studi.</small>
                    </div>
                </div>
                <div id="sync-status">
                    <span class="badge bg-success bg-opacity-10 text-success px-3 py-2 rounded-pill border border-success border-opacity-25">
                        <i class="fas fa-check-circle me-1"></i> Tersimpan
                    </span>
                </div>
            </div>
            
            <div class="card-body p-4">
                <form id="form-identitas-full">
                    {% csrf_token %}
                    
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Program Studi</label>
                            <select class="form-select" name="program_studi" id="program_studi">
                                <option value="">-- Pilih Program Studi --</option>
                                <option value="Informatika" {% if identitas.program_studi == "Informatika" %}selected{% endif %}>S1 Informatika</option>
                                <option value="Sistem Informasi" {% if identitas.program_studi == "Sistem Informasi" %}selected{% endif %}>S1 Sistem Informasi</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                             <label class="form-label fw-bold">Unit Pengelola (UPPS)</label>
                             <input type="text" class="form-control" name="unit_pengelola" value="{{ identitas.unit_pengelola|default:'' }}" placeholder="Fakultas / Sekolah Tinggi">
                        </div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-6">
                             <label class="form-label fw-bold">Perguruan Tinggi</label>
                             <input type="text" class="form-control" name="perguruan_tinggi" value="{{ identitas.perguruan_tinggi|default:'Universitas Pradita' }}">
                        </div>
                        <div class="col-md-6">
                             <label class="form-label fw-bold">Jenis Program</label>
                             <input type="text" class="form-control" name="jenis_program" value="{{ identitas.jenis_program|default:'' }}" placeholder="Sarjana / Diploma">
                        </div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-12">
                            <label class="form-label fw-bold">Alamat Program Studi</label>
                            <textarea class="form-control" name="alamat" rows="2" placeholder="Alamat lengkap...">{{ identitas.alamat|default:'' }}</textarea>
                        </div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-4">
                             <label class="form-label fw-bold">Nomor Telepon</label>
                             <input type="text" class="form-control" name="telepon" value="{{ identitas.telepon|default:'' }}">
                        </div>
                        <div class="col-md-4">
                             <label class="form-label fw-bold">Alamat Email</label>
                             <input type="email" class="form-control" name="email" value="{{ identitas.email|default:'' }}">
                        </div>
                        <div class="col-md-4">
                             <label class="form-label fw-bold">Website / URL</label>
                             <input type="text" class="form-control" name="website" value="{{ identitas.website|default:'' }}">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                             <label class="form-label fw-bold">Kota Pendirian</label>
                             <input type="text" class="form-control" name="kota_pendirian" value="{{ identitas.kota_pendirian|default:'Tangerang' }}">
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('form-identitas-full');
        const badge = document.getElementById('sync-status');
        let timer;

        function runAutosave() {
            // Animasi loading
            badge.innerHTML = `<span class="badge bg-warning bg-opacity-10 text-warning px-3 py-2 rounded-pill border border-warning border-opacity-25">
                                <i class="fas fa-spinner fa-spin me-1"></i> Sinkronisasi...</span>`;
            
            clearTimeout(timer);
            timer = setTimeout(() => {
                const formData = new FormData(form);
                fetch(window.location.pathname, {
                    method: 'POST',
                    body: formData,
                    headers: { 
                        'X-Requested-With': 'XMLHttpRequest',
                        'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value 
                    }
                })
                .then(res => res.json())
                .then(data => {
                    if(data.status === 'success') {
                        badge.innerHTML = `<span class="badge bg-success bg-opacity-10 text-success px-3 py-2 rounded-pill border border-success border-opacity-25">
                                            <i class="fas fa-check-circle me-1"></i> Tersimpan</span>`;
                    }
                })
                .catch(err => {
                    badge.innerHTML = `<span class="badge bg-danger bg-opacity-10 text-danger px-3 py-2 rounded-pill border border-danger border-opacity-25">
                                        <i class="fas fa-times-circle me-1"></i> Gagal</span>`;
                });
            }, 800);
        }

        // Simpan setiap kali ada ketikan teks atau textarea
        form.addEventListener('input', runAutosave);
        // Simpan setiap kali pilihan dropdown berubah
        document.getElementById('program_studi').addEventListener('change', runAutosave);
    });
</script>
{% endblock %}
